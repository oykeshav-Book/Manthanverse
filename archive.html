<!DOCTYPE html>
<html>
<head>
<title>Archive - Manthanverse</title>

<style>
body{
    margin:0;
    background:#07142d;
    color:#e5e7eb;
    font-family:Georgia, serif;
}

header img{
    width:100%;
    display:block;
}

nav{
    background:#0b1836;
    text-align:center;
    padding:14px;
}

nav a{
    color:white;
    text-decoration:none;
    margin:0 15px;
    font-weight:bold;
}

.section{
    background:#1c2a45;
    margin:20px;
    padding:25px;
    border-radius:8px;
}

h1,h2{
    color:white;
}
.archive-grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:30px;
    padding:40px;
}

.archive-card{
    background:#1c2a45;
    border-radius:20px;
    overflow:hidden;
    text-decoration:none;
    color:white;
    transition:0.3s;
}

.archive-card:hover{
    transform:translateY(-8px);
}

.archive-card img{
    width:100%;
    height:260px;
    object-fit:cover;
    display:block;
}

.archive-card h2{
    text-align:center;
    margin:20px 0 10px;
}

.archive-card p{
    text-align:center;
    color:#cbd5e1;
    padding:0 20px 25px;
}    
</style>

</head>
